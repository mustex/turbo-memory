global:
  scrape_interval: 5s # High-resolution tracking for real-time tokens

scrape_configs:
  - job_name: 'llama-cpp-gemma4'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['gemma4-generation:8000']
        labels:
          model_role: 'generation'
          model_name: 'gemma4'

  - job_name: 'llama-cpp-qwen3-embedding'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['qwen3-embedding:8000']
        labels:
          model_role: 'embedding'
          model_name: 'qwen3'

  - job_name: 'llama-cpp-qwen3-reranker'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['qwen3-reranker:8000']
        labels:
          model_role: 'reranker'
          model_name: 'qwen3'

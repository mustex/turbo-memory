events { worker_connections 1024; }

http {
    # Define upstreams matching the internal Docker container service names
    upstream gemma4_backend {
        server gemma4-generation:8000;
    }

    upstream embedding_backend {
        server qwen3-embedding:8000;
    }

    upstream reranker_backend {
        server qwen3-reranker:8000;
    }

    include /etc/nginx/conf.d/*.conf;
}